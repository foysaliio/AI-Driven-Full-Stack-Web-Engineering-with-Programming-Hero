<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>CSS Shadow</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h2>box-shadow</h2>
    <div class="box shadow-basic">Basic</div>
    <div class="box shadow-soft">Soft</div>
    <div class="box shadow-multiple">Multiple</div>
    <div class="box shadow-inset">Inset</div>
    <div class="box shadow-colored">Colored</div>

    <h2>text-shadow</h2>
    <p class="text-shadow-basic">Basic Text Shadow</p>
    <p class="text-shadow-glow">Glowing Text</p>
    <p class="text-shadow-3d">3D Text Effect</p>
  </body>
</html>
