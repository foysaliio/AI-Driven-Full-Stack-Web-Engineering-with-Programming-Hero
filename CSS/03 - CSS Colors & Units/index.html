<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>CSS Colors & Units</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <p class="color-name">Color by name (tomato)</p>
    <p class="color-hex">Color by hex (#3498db)</p>
    <p class="color-rgb">Color by rgb</p>
    <p class="color-rgba">Color by rgba</p>
    <p class="color-hsl">Color by hsl</p>

    <div class="unit-px">Font size in px</div>
    <div class="unit-percent">Width in %</div>
    <div class="unit-rem">Font size in rem</div>
    <div class="unit-em">Font size in em</div>
    <div class="unit-vh">Height in vh</div>
    <div class="unit-vw">Width in vw</div>
  </body>
</html>
