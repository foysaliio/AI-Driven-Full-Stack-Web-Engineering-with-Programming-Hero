<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HTML Entities</title>
  </head>

  <body>
    <h1 align="center">HTML Entities</h1>

    <p>Copyright: &copy;</p>

    <p>Trademark: &trade;</p>

    <p>Less Than: &lt;</p>

    <p>Greater Than: &gt;</p>

    <p>Ampersand: &amp;</p>

    <p>Non-breaking Space: Hello&nbsp;World</p>

    <p>Dollar: &dollar;</p>

    <p>Euro: &euro;</p>
  </body>
</html>
