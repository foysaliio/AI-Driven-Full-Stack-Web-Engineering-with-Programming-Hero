<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Attribute Selectors</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <input type="text" placeholder="type input">
  <input type="text" disabled placeholder="disabled input">

  <p class="tag">tag class</p>

  <p><a href="https://example.com">Secure link (starts with https)</a></p>
  <p><a href="report.pdf">PDF link (ends with .pdf)</a></p>
  <p><a href="https://example.com/page">Contains "example"</a></p>

  <p lang="en">English text</p>
  <p lang="en-US">English-US text</p>

</body>
</html>
