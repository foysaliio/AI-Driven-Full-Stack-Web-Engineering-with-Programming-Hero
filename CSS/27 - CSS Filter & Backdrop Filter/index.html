<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CSS Filter & Backdrop Filter</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h2>filter</h2>

  <p>blur</p>
  <img class="img-box filter-blur" src="./images/background.jpg" alt="blur">

  <p>brightness</p>
  <img class="img-box filter-brightness" src="./images/background.jpg" alt="brightness">

  <p>contrast</p>
  <img class="img-box filter-contrast" src="./images/background.jpg" alt="contrast">

  <p>grayscale</p>
  <img class="img-box filter-grayscale" src="./images/background.jpg" alt="grayscale">

  <p>sepia</p>
  <img class="img-box filter-sepia" src="./images/background.jpg" alt="sepia">

  <p>saturate</p>
  <img class="img-box filter-saturate" src="./images/background.jpg" alt="saturate">

  <p>hue-rotate</p>
  <img class="img-box filter-hue-rotate" src="./images/background.jpg" alt="hue-rotate">

  <p>multiple combined</p>
  <img class="img-box filter-multiple" src="./images/background.jpg" alt="multiple filters">

  <h2>backdrop-filter</h2>
  <div class="backdrop-wrapper">
    <div class="backdrop-box">Frosted glass effect using backdrop-filter: blur</div>
  </div>

</body>
</html>
