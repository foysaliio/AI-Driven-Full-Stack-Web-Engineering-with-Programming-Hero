<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CSS Object Fit & Object Position</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h2>object-fit</h2>
  <p>fill</p>
  <img class="img-box fit-fill" src="./images/wallpaper.jpg" alt="fill">

  <p>contain</p>
  <img class="img-box fit-contain" src="./images/wallpaper.jpg" alt="contain">

  <p>cover</p>
  <img class="img-box fit-cover" src="./images/wallpaper.jpg" alt="cover">

  <p>none</p>
  <img class="img-box fit-none" src="./images/wallpaper.jpg" alt="none">

  <p>scale-down</p>
  <img class="img-box fit-scale-down" src="./images/wallpaper.jpg" alt="scale-down">

  <h2>object-position</h2>
  <p>top</p>
  <img class="img-box position-top" src="./images/car.jpg" alt="top">

  <p>bottom</p>
  <img class="img-box position-bottom" src="./images/car.jpg" alt="bottom">

  <p>custom (20% 80%)</p>
  <img class="img-box position-custom" src="./images/car.jpg" alt="custom position">

</body>
</html>
