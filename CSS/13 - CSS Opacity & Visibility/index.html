<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>CSS Opacity & Visibility</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="box opacity-full">Opacity 1</div>
    <div class="box opacity-half">Opacity 0.5</div>
    <div class="box opacity-low">Opacity 0.2</div>

    <div class="box visibility-hidden">Hidden box (still takes space)</div>
    <div class="box visibility-visible">Visible box</div>
  </body>
</html>
