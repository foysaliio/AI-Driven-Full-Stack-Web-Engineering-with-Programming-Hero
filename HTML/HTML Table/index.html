<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HTML Table</title>
  </head>
  <body>
    <h1 align="center">HTML Table Practics</h1>

    <table
      border="1"
      cellpadding="30"
      cellspacing="2"
      width="900"
      align="center"
    >
      <thead>
        <th>Name</th>
        <th>Roll</th>
        <th>Depertment</th>
        <th>Location</th>
        <th>Is employed</th>
      </thead>
      <tbody>
        <tr>
          <td>Foysal Hossien</td>
          <td>212101</td>
          <td>EEE</td>
          <td>Dhaka</td>
          <td>No</td>
        </tr>

        <tr>
          <td>Arif Hossien</td>
          <td>212102</td>
          <td>CSE</td>
          <td rowspan="2">Gazipur</td>
          <td>Yes</td>
        </tr>

        <tr>
          <td>Mehedi Hossien</td>
          <td>212103</td>
          <td>Civil</td>
          <td rowspan="2">No</td>
        </tr>

        <tr>
          <td>Akash Hossien</td>
          <td>212104</td>
          <td rowspan="2">Power</td>
          <td>Narayangonj</td>
        </tr>

        <tr>
          <td>Rakib Hossien</td>
          <td>212105</td>
          <td>Uttara</td>
          <td>Yes</td>
        </tr>
        <tr>
          <td align="center" colspan="5">ABC University of Engineering Technology</td>
        </tr>
      </tbody>
    </table>
  </body>
</html>
