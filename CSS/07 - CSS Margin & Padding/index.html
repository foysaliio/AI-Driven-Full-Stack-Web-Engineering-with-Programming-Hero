<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>CSS Margin & Padding</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="box margin-all">Margin all sides</div>
    <div class="box margin-sides">Margin top/bottom & left/right</div>
    <div class="box margin-each">Margin each side different</div>
    <div class="box margin-auto">Margin auto (centered)</div>
    <div class="box padding-all">Padding all sides</div>
    <div class="box padding-sides">Padding top/bottom & left/right</div>
    <div class="box padding-each">Padding each side different</div>
  </body>
</html>
