<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>CSS Selectors</title>

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css" />

    <!-- Internal CSS -->
    <style>
      .internal-box {
        border: 2px solid blue;
        padding: 10px;
      }
    </style>
  </head>
  
  <body>
    <h1 id="main-title">CSS Selectors Practice</h1>

    <div class="container">
      <h2>Section Heading</h2>
      <p>First paragraph (adjacent sibling of h2).</p>
      <p>Second paragraph (general sibling of h2).</p>

      <div class="external-box">External CSS box</div>
      <div class="internal-box">Internal CSS box</div>

      <!-- Inline CSS -->
      <div style="border: 2px solid red; padding: 10px">Inline CSS box</div>
    </div>
  </body>
</html>
