<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>CSS Display</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="display-block">Block 1</div>
    <div class="display-block">Block 2</div>

    <span class="display-inline">Inline 1</span>
    <span class="display-inline">Inline 2</span>

    <p class="visibility-hidden">
      This is visibility-hidden (visibility-hidden)
    </p>

    <p class="visibility-visible">
      This is visibility-hidden (visibility-visible)
    </p>

    <p class="show-display-block">This is shown (display: block)</p>
    <p class="hide-display-none">This is hidden (display: none)</p>

    <div class="display-inline-block">Inline-block 1</div>
    <div class="display-inline-block">Inline-block 2</div>
  </body>
</html>
